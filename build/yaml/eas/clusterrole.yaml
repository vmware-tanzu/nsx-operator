apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nsx-eas-reader
rules:
- apiGroups: ["eas.nsx.vmware.com"]
  resources:
  - vpcipaddressusages
  - ipblockusages
  - subnetippools
  - subnetdhcpserverstats
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nsx-eas-reader-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: nsx-eas-reader
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: Group
  name: system:authenticated