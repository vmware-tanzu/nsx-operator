---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: nats.crd.nsx.vmware.com
spec:
  group: crd.nsx.vmware.com
  names:
    kind: NAT
    listKind: NATList
    plural: nats
    shortNames:
    - nat
    singular: nat
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: SNAT or DNAT
      jsonPath: .spec.action
      name: Action
      type: string
    - description: Source CIDR or IP (SNAT)
      jsonPath: .spec.sourceNetwork
      name: Source
      type: string
    - description: Destination CIDR or IP literal for DNAT (empty if using allocation)
      jsonPath: .spec.destinationNetwork
      name: Dest
      type: string
    - description: IPAddressAllocation name for DNAT destination (empty if using literal)
      jsonPath: .spec.destinationNetworkAllocation
      name: DestAlloc
      type: string
    - description: Effective IP/CIDR observed on NSX or from allocation
      jsonPath: .status.realizedCIDR
      name: RealizedIP
      type: string
    - description: Ready condition status
      jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: NAT is the Schema for configuring SNAT or DNAT on a VPC (one
          action per object).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              NATSpec defines the desired state of NAT.
              translatedNetworkAllocation vs translatedNetwork, and destinationNetworkAllocation vs destinationNetwork, are mutually exclusive pairs.
              Allocation fields reference an IPAddressAllocation CR by metadata.name in the same namespace as this NAT.

              SNAT is modeled with sourceNetwork plus a translated side (allocation or literal). DNAT adds a destination side.
              If you later need destination-specific SNAT, extend this spec explicitly rather than overloading DNAT-only fields.
            properties:
              action:
                description: Action is the NAT direction. One of SNAT or DNAT; create
                  separate NAT objects if both are needed.
                enum:
                - SNAT
                - DNAT
                type: string
                x-kubernetes-validations:
                - message: Value is immutable
                  rule: self == oldSelf
              destinationNetwork:
                description: DestinationNetwork is a literal IP or CIDR for the destination
                  side on DNAT (mutually exclusive with DestinationNetworkAllocation).
                type: string
                x-kubernetes-validations:
                - message: Value is immutable
                  rule: self == oldSelf
              destinationNetworkAllocation:
                description: |-
                  DestinationNetworkAllocation is the metadata.name of an IPAddressAllocation in the same namespace
                  for the destination side on DNAT (mutually exclusive with DestinationNetwork).
                type: string
                x-kubernetes-validations:
                - message: Value is immutable
                  rule: self == oldSelf
              sourceNetwork:
                description: |-
                  SourceNetwork is the source CIDR or IP for SNAT (required when action is SNAT).
                  Changing this in place can break existing sessions; treat updates as invalid and recreate the NAT if needed.
                type: string
                x-kubernetes-validations:
                - message: Value is immutable
                  rule: self == oldSelf
              translatedNetwork:
                description: TranslatedNetwork is a literal IP or CIDR for the translated
                  side (mutually exclusive with TranslatedNetworkAllocation).
                type: string
                x-kubernetes-validations:
                - message: Value is immutable
                  rule: self == oldSelf
              translatedNetworkAllocation:
                description: |-
                  TranslatedNetworkAllocation is the metadata.name of an IPAddressAllocation in the same namespace
                  whose allocated address is used as the post-NAT address on the translated side (mutually exclusive with TranslatedNetwork).
                type: string
                x-kubernetes-validations:
                - message: Value is immutable
                  rule: self == oldSelf
            required:
            - action
            type: object
            x-kubernetes-validations:
            - message: 'Pick one on the translated side: set translatedNetwork (static
                IP/CIDR) OR translatedNetworkAllocation (IPAddressAllocation name),
                not both.'
              rule: '!((has(self.translatedNetworkAllocation) && self.translatedNetworkAllocation
                != "") && (has(self.translatedNetwork) && self.translatedNetwork !=
                ""))'
            - message: 'Pick one on the destination side: set destinationNetwork (static
                IP/CIDR) OR destinationNetworkAllocation (IPAddressAllocation name),
                not both.'
              rule: '!((has(self.destinationNetworkAllocation) && self.destinationNetworkAllocation
                != "") && (has(self.destinationNetwork) && self.destinationNetwork
                != ""))'
            - message: 'For SNAT: set sourceNetwork, and set exactly one of translatedNetwork
                or translatedNetworkAllocation.'
              rule: self.action != "SNAT" || (has(self.sourceNetwork) && self.sourceNetwork
                != "" && ((has(self.translatedNetworkAllocation) && self.translatedNetworkAllocation
                != "") != (has(self.translatedNetwork) && self.translatedNetwork !=
                "")))
            - message: 'For DNAT: set exactly one of destinationNetwork or destinationNetworkAllocation,
                and exactly one of translatedNetwork or translatedNetworkAllocation.'
              rule: self.action != "DNAT" || (((has(self.destinationNetworkAllocation)
                && self.destinationNetworkAllocation != "") != (has(self.destinationNetwork)
                && self.destinationNetwork != "")) && ((has(self.translatedNetworkAllocation)
                && self.translatedNetworkAllocation != "") != (has(self.translatedNetwork)
                && self.translatedNetwork != "")))
          status:
            description: |-
              NATStatus defines the observed state of NAT.
              Conditions use the shared Condition type (same as other vpc v1alpha1 CRDs).
              Controllers should use the Ready condition (Reason/Message carry finer-grained states until more condition types are needed).
            properties:
              conditions:
                items:
                  description: Condition defines condition of custom resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        Last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed. If that is not known, then using the time when
                        the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: Message shows a human-readable message about condition.
                      type: string
                    reason:
                      description: Reason shows a brief reason of condition.
                      type: string
                    status:
                      description: Status of the condition, one of True, False, Unknown.
                      type: string
                    type:
                      description: Type defines condition type.
                      type: string
                  required:
                  - status
                  - type
                  type: object
                type: array
              realizedCIDR:
                description: RealizedCIDR surfaces the effective IP or CIDR after
                  realization (especially useful when spec only names an IPAddressAllocation).
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
